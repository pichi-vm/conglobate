name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  license-headers:
    name: license headers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: korandoru/hawkeye@v6

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  commit-messages:
    name: commit messages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: pipx run gitlint --commits "origin/${{ github.base_ref || 'main' }}..HEAD"

  lint:
    name: fmt + clippy
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  # conglobate's library half (the pichi.build recipe I/O types) is portable;
  # its binary half (the device-mapper/virtio-fs build driver) is Linux-only
  # and excluded by target cfg off-Linux. The matrix proves the portable lib
  # builds and its recipe tests pass on every host, with the bin compiled as
  # the `#[cfg(not(target_os = "linux"))]` stub away from Linux.
  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-2025]
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - run: cargo test
